name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install development tools
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force

      - name: Run lint, static analysis, formatting, and JSON checks
        shell: pwsh
        run: .\Hush\tools\Invoke-Quality.ps1
